site_name: Project Showcase Skill
site_description: Automate the "last mile" of development — visual galleries, README injection, repo health audits, and social media launches.
site_author: ayushxx7
repo_url: https://github.com/ayushxx7/project-showcase-skill
repo_name: ayushxx7/project-showcase-skill

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Prerequisites: getting-started/prerequisites.md
  - Scripts & Tools:
    - Overview: scripts/overview.md
    - UI Capture: scripts/capture.md
    - Security Scan: scripts/scan.md
    - Repo Audit: scripts/audit.md
    - README Injection: scripts/inject_readme.md
    - GitHub Release: scripts/release.md
    - Metadata: scripts/metadata.md
    - CLI Recording: scripts/vhs.md
  - Guides:
    - README Customization: guides/readme-customization.md
    - Responsive Capture: guides/responsive-capture.md
    - Security & Privacy: guides/security.md
    - LinkedIn Launch: guides/linkedin-launch.md
  - About:
    - License: about/license.md
    - Contributing: about/contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
